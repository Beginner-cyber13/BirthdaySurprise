<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --velvet:        #150427;
  --velvet-mid:    #260840;
  --purple-light:  #d4a0ff;
  --purple-mid:    #9b5de5;
  --purple-deep:   #6a1faa;
  --pink:          #ff80cc;
  --gold:          #ffe066;
  --white:         #fff0ff;
}

/* ─── BASE ─────────────────────────────────────────── */
body {
  min-height: 100vh;
  background: var(--velvet);
  background-image:
    radial-gradient(ellipse at 15% 50%, #2e0855 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, #1f0440 0%, transparent 45%),
    radial-gradient(ellipse at 65% 85%, #1a033a 0%, transparent 40%);
  font-family: 'Josefin Sans', sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
}

/* ─── FLOATING HEARTS ───────────────────────────────── */
.hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.heart-float {
  position: absolute;
  animation: floatUp linear infinite;
  user-select: none;
}
@keyframes floatUp {
  0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 0.7; }
  100% { transform: translateY(-10vh) rotate(30deg);  opacity: 0; }
}

/* ─── LOCK SCREEN ───────────────────────────────────── */
#lock-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 64px;
  position: relative;
  z-index: 10;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#lock-screen.out {
  opacity: 0;
  transform: scale(0.88) translateY(20px);
  pointer-events: none;
}

/* ─── DIALPAD ───────────────────────────────────────── */
.dialpad-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}
.dial-label {
  font-family: 'Parisienne', cursive;
  color: var(--purple-light);
  font-size: 1.35rem;
  text-shadow: 0 0 24px rgba(212,160,255,0.55);
  letter-spacing: 0.04em;
}

.display-box {
  width: 204px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(212,160,255,0.28);
  border-radius: 14px;
  padding: 12px 20px;
  text-align: center;
  font-size: 2rem;
  color: var(--purple-light);
  letter-spacing: 10px;
  min-height: 58px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 24px rgba(212,160,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
  transition: border-color 0.2s, color 0.2s;
}
.display-box.wrong {
  border-color: #ff4477;
  color: #ff4477;
}
.display-box.shake { animation: shake 0.42s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  18%      { transform: translateX(-9px); }
  36%      { transform: translateX(9px); }
  54%      { transform: translateX(-6px); }
  72%      { transform: translateX(6px); }
}

.dialpad {
  display: grid;
  grid-template-columns: repeat(3, 62px);
  gap: 11px;
}
.dial-btn {
  width: 62px; height: 62px;
  border-radius: 50%;
  border: 1.5px solid rgba(212,160,255,0.25);
  background: rgba(255,255,255,0.035);
  color: var(--white);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 1.25rem;
  font-weight: 300;
  cursor: pointer;
  transition: all 0.14s ease;
  backdrop-filter: blur(6px);
  position: relative;
  overflow: hidden;
}
.dial-btn::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(212,160,255,0.22), transparent 65%);
  opacity: 0;
  transition: opacity 0.14s;
}
.dial-btn:hover {
  background: rgba(212,160,255,0.13);
  border-color: var(--purple-light);
  transform: scale(1.06);
  box-shadow: 0 0 18px rgba(212,160,255,0.35);
}
.dial-btn:hover::before { opacity: 1; }
.dial-btn:active { transform: scale(0.93); }
.dial-btn.del { color: var(--purple-light); font-size: 1.1rem; }
.dial-btn.enter { color: var(--pink); font-size: 1rem; }

.wrong-hint {
  font-size: 0.72rem;
  color: #ff4477;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  min-height: 14px;
  opacity: 0;
  transition: opacity 0.2s;
}
.wrong-hint.show { opacity: 1; }

/* ─── PHOTO FRAME ───────────────────────────────────── */
.photo-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.bow-frame {
  position: relative;
  width: 248px;
  height: 268px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Bow decoraction */
.bow {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 48px;
  z-index: 20;
  filter: drop-shadow(0 4px 10px rgba(255,80,180,0.5));
}
.bow-lobe {
  position: absolute;
  width: 38px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff99d9 0%, #ff44aa 100%);
  top: 8px;
}
.bow-lobe.left  { left: 4px;  transform: rotate(30deg);  transform-origin: right center; }
.bow-lobe.right { right: 4px; transform: rotate(-30deg); transform-origin: left center;  }
.bow-knot {
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #ff44aa;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: 5;
  box-shadow: 0 0 10px rgba(255,68,170,0.7);
}
.bow-tail {
  position: absolute;
  width: 18px; height: 10px;
  background: linear-gradient(to bottom, #ff99d9, #ff44aa);
  bottom: -2px;
  border-radius: 0 0 6px 6px;
}
.bow-tail.left  { left: 30px;  transform: rotate(18deg);  transform-origin: top right; }
.bow-tail.right { right: 30px; transform: rotate(-18deg); transform-origin: top left;  }

/* Gradient ring frame */
.frame-ring {
  width: 230px; height: 230px;
  border-radius: 50%;
  background: conic-gradient(from 180deg, #d4a0ff, #ff80cc, #9b5de5, #ffe066, #ff80cc, #d4a0ff);
  padding: 3.5px;
  margin-top: 14px;
  box-shadow: 0 0 40px rgba(212,160,255,0.45), 0 0 70px rgba(212,160,255,0.15);
  animation: spinRing 6s linear infinite;
}
@keyframes spinRing {
  to { filter: hue-rotate(360deg); }
}
.frame-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  overflow: hidden;
  background: linear-gradient(145deg, #2e0855, #150427);
  display: flex; align-items: center; justify-content: center;
}
.frame-inner img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}
.photo-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; color: var(--purple-light);
  font-size: 0.7rem; letter-spacing: 0.15em;
  text-transform: uppercase;
}
.photo-placeholder span:first-child { font-size: 2.6rem; }

.photo-caption {
  font-family: 'Parisienne', cursive;
  color: var(--purple-light);
  font-size: 1.2rem;
  text-shadow: 0 0 18px rgba(212,160,255,0.5);
}

/* ─── CAKE SCREEN ───────────────────────────────────── */
#cake-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transform: scale(1.04);
  transition: opacity 0.9s ease 0.2s, transform 0.9s ease 0.2s;
}
#cake-screen.visible {
  opacity: 1;
  pointer-events: all;
  transform: scale(1);
}

/* ─── CANDLES ───────────────────────────────────────── */
.candles-row {
  display: flex; gap: 16px;
  align-items: flex-end;
  margin-bottom: 2px;
}
.candle { display: flex; flex-direction: column; align-items: center; }

.flame-wrap {
  height: 30px;
  display: flex; align-items: flex-end; justify-content: center;
  position: relative;
}
.flame {
  width: 11px; height: 22px;
  background: radial-gradient(ellipse at 45% 80%, #fff5b0 0%, #ffb300 45%, rgba(255,80,0,0.4) 100%);
  border-radius: 50% 50% 30% 30%;
  animation: flicker 0.28s ease-in-out infinite alternate;
  transform-origin: bottom center;
  box-shadow: 0 0 6px #ffb300, 0 0 14px rgba(255,150,0,0.45);
  position: relative;
}
.flame-core {
  position: absolute; bottom: 3px;
  left: 50%; transform: translateX(-50%);
  width: 4px; height: 9px;
  background: rgba(255,255,200,0.9);
  border-radius: 50% 50% 30% 30%;
}
@keyframes flicker {
  from { transform: scaleX(1.00) scaleY(1.00) rotate(-2deg); }
  to   { transform: scaleX(0.86) scaleY(1.12) rotate( 3deg); }
}
.candle-wick { width: 2px; height: 6px; background: #4a3525; border-radius: 1px; }
.candle-body {
  border-radius: 3px 3px 2px 2px;
  position: relative; overflow: hidden;
}
.candle-body::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.25) 30%, transparent 60%);
}

/* 5 candles with varied heights & colors */
.candle:nth-child(1) .candle-body { width:10px; height:38px; background:linear-gradient(to bottom,#ffb3de,#cc2288); }
.candle:nth-child(2) .candle-body { width:10px; height:48px; background:linear-gradient(to bottom,#d4a0ff,#7a1fc0); }
.candle:nth-child(3) .candle-body { width:10px; height:42px; background:linear-gradient(to bottom,#ffe599,#e08800); }
.candle:nth-child(4) .candle-body { width:10px; height:44px; background:linear-gradient(to bottom,#ffb3de,#cc2288); }
.candle:nth-child(5) .candle-body { width:10px; height:36px; background:linear-gradient(to bottom,#d4a0ff,#7a1fc0); }

/* ─── CAKE TIERS ────────────────────────────────────── */
.cake-scene { display:flex; flex-direction:column; align-items:center; }

.frosting {
  height: 10px;
  border-radius: 6px 6px 0 0;
  position: relative;
}
/* wavy frosting drips using clip-path */
.frosting::after {
  content: '';
  position: absolute; bottom: -6px; left: 0; right: 0;
  height: 12px;
  background: inherit;
  clip-path: polygon(
    0% 0%, 5% 100%, 10% 0%, 15% 100%, 20% 0%, 25% 100%,
    30% 0%, 35% 100%, 40% 0%, 45% 100%, 50% 0%, 55% 100%,
    60% 0%, 65% 100%, 70% 0%, 75% 100%, 80% 0%, 85% 100%,
    90% 0%, 95% 100%, 100% 0%, 100% 0%, 0% 0%
  );
}

.tier {
  display: flex; align-items: center; justify-content: center;
  position: relative;
  border-radius: 4px;
  overflow: visible;
  flex-shrink: 0;
}
.tier span {
  color: rgba(255,255,255,0.55);
  font-size: 1rem;
  letter-spacing: 5px;
  pointer-events: none;
}

/* Top tier */
.frosting-top  { width:158px; background:linear-gradient(to right,#f5c0ef,#f0a8e8,#f5c0ef); }
.tier-top {
  width:158px; height:58px;
  background:linear-gradient(to bottom, #f2b8ec 0%, #e099d8 100%);
  box-shadow: 0 5px 0 #b870a8, 0 8px 22px rgba(0,0,0,0.35);
  z-index: 3;
}

/* Mid tier */
.frosting-mid  { width:222px; background:linear-gradient(to right,#d8a4f8,#c080f0,#d8a4f8); margin-top:12px; }
.tier-mid {
  width:222px; height:68px;
  background:linear-gradient(to bottom, #d0a0f5 0%, #b870e0 100%);
  box-shadow: 0 5px 0 #8840b0, 0 8px 22px rgba(0,0,0,0.35);
  z-index: 2;
}

/* Bottom tier */
.frosting-bot  { width:296px; background:linear-gradient(to right,#b880e8,#9050c8,#b880e8); margin-top:12px; }
.tier-bot {
  width:296px; height:78px;
  background:linear-gradient(to bottom, #b078e0 0%, #8840c0 100%);
  box-shadow: 0 5px 0 #5820a0, 0 8px 22px rgba(0,0,0,0.35);
  z-index: 1;
}

.cake-plate {
  width:330px; height:18px;
  background:linear-gradient(to bottom,#ddc0f0,#c0a0d8);
  border-radius:50%;
  margin-top:-2px;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* Tier decorations */
.tier-top::before,  .tier-mid::before, .tier-bot::before {
  content:'';
  position:absolute; bottom:0; left:4px; right:4px; height:3px;
  background: repeating-linear-gradient(90deg,
    #ffe066 0,#ffe066 8px, #ff80cc 8px,#ff80cc 16px, #d4a0ff 16px,#d4a0ff 24px);
  border-radius:0 0 3px 3px; opacity:0.7;
}

/* ─── BLOW BUTTON ───────────────────────────────────── */
.blow-btn {
  font-family: 'Parisienne', cursive;
  font-size: 1.5rem;
  color: #1a0033;
  background: linear-gradient(135deg, #d4a0ff 0%, #ff80cc 50%, #d4a0ff 100%);
  background-size: 200% 200%;
  border: none;
  padding: 14px 44px;
  border-radius: 60px;
  cursor: pointer;
  box-shadow:
    0 0 30px rgba(212,160,255,0.6),
    0 4px 18px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.4);
  transition: transform 0.18s, box-shadow 0.18s;
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
.blow-btn:hover {
  transform: scale(1.07);
  box-shadow: 0 0 50px rgba(212,160,255,0.8), 0 4px 24px rgba(0,0,0,0.3);
}
.blow-btn:active { transform: scale(0.96); }

/* ─── BIRTHDAY MESSAGE ──────────────────────────────── */
#bday-msg {
  font-family: 'Parisienne', cursive;
  font-size: clamp(2rem, 5vw, 3.2rem);
  color: transparent;
  background: linear-gradient(135deg, #e0b0ff, #9b5de5, #7020c0, #d4a0ff);
  -webkit-background-clip: text;
  background-clip: text;
  text-align: center;
  opacity: 0;
  transform: translateY(18px) scale(0.92);
  transition: opacity 1.1s cubic-bezier(0.22,1,0.36,1), transform 1.1s cubic-bezier(0.22,1,0.36,1);
  filter: drop-shadow(0 0 22px rgba(180,100,255,0.75));
  line-height: 1.35;
  pointer-events: none;
}
#bday-msg.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* ─── SMOKE ─────────────────────────────────────────── */
.smoke {
  position: fixed;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(210,210,210,0.55);
  animation: smokeRise 1.1s ease forwards;
  pointer-events: none;
  z-index: 200;
}
@keyframes smokeRise {
  0%   { transform: translate(0,0) scale(0.4); opacity: 0.75; }
  100% { transform: translate(var(--dx,0px), -50px) scale(2.5); opacity: 0; }
}

/* ─── SPARKLES ──────────────────────────────────────── */
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  animation: sparklePop 1.6s ease forwards;
}
@keyframes sparklePop {
  0%   { transform: translateY(0) scale(0) rotate(0deg);   opacity: 1; }
  60%  { opacity: 1; }
  100% { transform: translateY(70px) scale(1.2) rotate(var(--rot,45deg)); opacity: 0; }
}
</style>
</head>
<body>

<!-- ── Floating hearts ─────────────────────────────── -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- ── LOCK SCREEN ────────────────────────────────── -->
<div id="lock-screen">

  <!-- LEFT: Dialpad -->
  <div class="dialpad-wrapper">
    <div class="dial-label">✦ Enter the secret ✦</div>

    <div class="display-box" id="display"></div>

    <div class="dialpad">
      <button class="dial-btn" onclick="press('1')">1</button>
      <button class="dial-btn" onclick="press('2')">2</button>
      <button class="dial-btn" onclick="press('3')">3</button>
      <button class="dial-btn" onclick="press('4')">4</button>
      <button class="dial-btn" onclick="press('5')">5</button>
      <button class="dial-btn" onclick="press('6')">6</button>
      <button class="dial-btn" onclick="press('7')">7</button>
      <button class="dial-btn" onclick="press('8')">8</button>
      <button class="dial-btn" onclick="press('9')">9</button>
      <button class="dial-btn del"   onclick="del()">⌫</button>
      <button class="dial-btn"       onclick="press('0')">0</button>
      <button class="dial-btn enter" onclick="submit()">✓</button>
    </div>
    <div class="wrong-hint" id="wrongHint">Wrong password, try again 💜</div>
  </div>

  <!-- RIGHT: Photo in bow frame -->
  <div class="photo-wrapper">
    <div class="bow-frame">
      <!-- Bow -->
      <div class="bow">
        <div class="bow-lobe left"></div>
        <div class="bow-lobe right"></div>
        <div class="bow-knot"></div>
        <div class="bow-tail left"></div>
        <div class="bow-tail right"></div>
      </div>

      <!-- Gradient ring + photo -->
      <div class="frame-ring">
        <div class="frame-inner" id="frameInner">
          <!--
            ╔══════════════════════════════════════════════════════╗
            ║  Replace the src below with your friend's photo URL  ║
            ║  or a base64 data URI. The placeholder shows if the  ║
            ║  image can't be loaded.                              ║
            ╚══════════════════════════════════════════════════════╝
          -->
          <img src="YOUR_FRIENDS_PHOTO_URL_HERE" alt="Bestie"
               onerror="this.remove(); showPlaceholder();">
        </div>
      </div>
    </div>
    <div class="photo-caption">my bestie 💜</div>
  </div>

</div><!-- /lock-screen -->

<!-- ── CAKE SCREEN ─────────────────────────────────── -->
<div id="cake-screen">

  <div class="cake-scene">
    <!-- Candles -->
    <div class="candles-row" id="candleRow">
      <div class="candle"><div class="flame-wrap"><div class="flame"><div class="flame-core"></div></div></div><div class="candle-wick"></div><div class="candle-body"></div></div>
      <div class="candle"><div class="flame-wrap"><div class="flame"><div class="flame-core"></div></div></div><div class="candle-wick"></div><div class="candle-body"></div></div>
      <div class="candle"><div class="flame-wrap"><div class="flame"><div class="flame-core"></div></div></div><div class="candle-wick"></div><div class="candle-body"></div></div>
      <div class="candle"><div class="flame-wrap"><div class="flame"><div class="flame-core"></div></div></div><div class="candle-wick"></div><div class="candle-body"></div></div>
      <div class="candle"><div class="flame-wrap"><div class="flame"><div class="flame-core"></div></div></div><div class="candle-wick"></div><div class="candle-body"></div></div>
    </div>

    <!-- Top tier -->
    <div class="frosting frosting-top"></div>
    <div class="tier tier-top"><span>✿ ❀ ✿</span></div>
    <!-- Mid tier -->
    <div class="frosting frosting-mid"></div>
    <div class="tier tier-mid"><span>✦ ❋ ✦ ❋ ✦</span></div>
    <!-- Bottom tier -->
    <div class="frosting frosting-bot"></div>
    <div class="tier tier-bot"><span>♡ ✿ ♡ ✿ ♡ ✿ ♡</span></div>
    <!-- Plate -->
    <div class="cake-plate"></div>
  </div>

  <button class="blow-btn" id="blowBtn" onclick="blow()">🌬️ Blow the Candles!</button>
  <div id="bday-msg">Happy Birthday Bestie 💜</div>

</div><!-- /cake-screen -->

<script>
/* ──────────────────────────────────────────────────────
   CONFIG — change the password here ↓
   ────────────────────────────────────────────────────── */
const PASSWORD = '1234';

/* ── Floating hearts ──────────────────────────────── */
const bg = document.getElementById('heartsBg');
for (let i = 0; i < 28; i++) {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = '💜';
  const sz = 0.9 + Math.random() * 1.8;
  h.style.cssText = `
    left: ${Math.random()*100}vw;
    font-size: ${sz}rem;
    opacity: ${0.08 + Math.random()*0.18};
    animation-duration: ${9 + Math.random()*13}s;
    animation-delay: ${-(Math.random()*18)}s;
  `;
  bg.appendChild(h);
}

/* ── Photo placeholder ────────────────────────────── */
function showPlaceholder() {
  const inner = document.getElementById('frameInner');
  inner.innerHTML = `
    <div class="photo-placeholder">
      <span>📷</span>
      <span>Add Photo</span>
    </div>`;
}

/* ── Dialpad ──────────────────────────────────────── */
let code = '';
const display    = document.getElementById('display');
const wrongHint  = document.getElementById('wrongHint');

function press(d) {
  if (code.length >= PASSWORD.length) return;
  code += d;
  render();
  if (code.length === PASSWORD.length) setTimeout(check, 220);
}
function del() {
  code = code.slice(0, -1);
  render();
  display.classList.remove('wrong');
  wrongHint.classList.remove('show');
}
function submit() { if (code.length) check(); }

function render() {
  display.textContent = '●'.repeat(code.length) || '';
}

function check() {
  if (code === PASSWORD) {
    display.style.borderColor = '#d4a0ff';
    display.style.color       = '#d4a0ff';
    display.textContent       = '✓ ✓ ✓ ✓';
    setTimeout(() => {
      document.getElementById('lock-screen').classList.add('out');
      setTimeout(() => {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('cake-screen').classList.add('visible');
      }, 850);
    }, 550);
  } else {
    display.classList.add('wrong','shake');
    display.textContent = '✕ ✕ ✕ ✕';
    wrongHint.classList.add('show');
    setTimeout(() => {
      display.classList.remove('shake','wrong');
      code = '';
      render();
      setTimeout(() => wrongHint.classList.remove('show'), 1200);
    }, 900);
  }
}

/* ── Blow candles ─────────────────────────────────── */
let blown = false;

function blow() {
  if (blown) return;
  blown = true;

  const flames = document.querySelectorAll('.flame');

  flames.forEach((fl, i) => {
    setTimeout(() => {
      const r = fl.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top  + r.height / 2;

      // hide flame
      fl.style.opacity    = '0';
      fl.style.transition = 'opacity 0.18s';

      // smoke puffs
      for (let s = 0; s < 4; s++) {
        const sm = document.createElement('div');
        sm.className = 'smoke';
        const dx = (Math.random() - 0.5) * 20;
        sm.style.cssText = `
          left: ${cx - 4.5}px; top: ${cy}px;
          --dx: ${dx}px;
          animation-delay: ${s * 0.12}s;
        `;
        document.body.appendChild(sm);
        setTimeout(() => sm.remove(), 1400);
      }
    }, i * 200);
  });

  // After last candle
  const delay = flames.length * 200 + 600;
  setTimeout(() => {
    document.getElementById('blowBtn').style.display = 'none';
    document.getElementById('bday-msg').classList.add('show');
    burst();
  }, delay);
}

/* ── Sparkle burst ────────────────────────────────── */
function burst() {
  const em = ['💜','✨','🎂','🎉','💖','🌟','💫','🎊','⭐','🪄'];
  for (let i = 0; i < 38; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = em[Math.floor(Math.random() * em.length)];
      const rot = (Math.random() - 0.5) * 90;
      s.style.cssText = `
        left: ${Math.random()*100}vw;
        top:  ${Math.random()*60 + 10}vh;
        font-size: ${0.9 + Math.random()*1.6}rem;
        --rot: ${rot}deg;
        animation-delay: ${Math.random()*0.5}s;
      `;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 2200);
    }, i * 55);
  }
}
</script>
